openapi: 3.0.1
info:
  title: Service
  version: 1.0.0
paths:
  /automovel:
    get:
      tags:
      - Automovel
      operationId: findAll
      responses:
        "200":
          description: findAll 200 response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Automovel"
    post:
      tags:
      - Automovel
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Automovel"
        required: true
      responses:
        "200":
          description: create 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Automovel"
  /automovel/{id}:
    get:
      tags:
      - Automovel
      operationId: findById
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: findById 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Automovel"
    put:
      tags:
      - Automovel
      operationId: update
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Automovel"
        required: true
      responses:
        "200":
          description: update 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Automovel"
    delete:
      tags:
      - Automovel
      operationId: delete
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: delete 200 response
          content:
            application/json:
              schema:
                type: object
components:
  schemas:
    Automovel:
      required:
      - marca
      - matricula
      - modelo
      - placa
      type: object
      properties:
        id:
          type: integer
          format: int64
          nullable: true
        matricula:
          minLength: 1
          type: string
        ano:
          minimum: 0
          exclusiveMinimum: true
          type: integer
          format: int32
        modelo:
          minLength: 1
          type: string
        placa:
          minLength: 1
          type: string
        marca:
          minLength: 1
          type: string
        valorDiaria:
          minimum: 0
          exclusiveMinimum: true
          type: number
        fotoPrincipal:
          type: string
